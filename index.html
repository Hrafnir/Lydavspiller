<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lydavspiller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Lydavspiller</h1>
        </header>

        <main>
            <section class="player-section">
                <div class="now-playing">
                    <span id="current-track-name">Ingen fil valgt</span>
                </div>

                <div class="progress-container">
                    <span id="time-current">00:00</span>
                    <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0" step="0.1" disabled>
                    <span id="time-total">00:00</span>
                </div>

                <div class="controls">
                    <button id="btn-play" class="control-btn play-btn" disabled>▶️ Spill</button>
                    <button id="btn-pause" class="control-btn pause-btn" disabled>⏸️ Pause</button>
                    <button id="btn-stop" class="control-btn stop-btn" disabled>⏹️ Stopp</button>
                </div>

                <div class="volume-controls">
                    <button id="btn-vol-down" class="vol-btn">🔉 Volum -</button>
                    <span id="volume-display">100%</span>
                    <button id="btn-vol-up" class="vol-btn">🔊 Volum +</button>
                </div>
            </section>

            <section class="playlist-section">
                <h2>Spilleliste</h2>
                <ul id="playlist" class="playlist">
                    <li class="empty-list-msg">Laster filer...</li>
                </ul>
            </section>

            <section class="file-loader-section">
                <h2 style="margin-top: 30px; font-size: 1.2rem; color: #aaa; border: none;">Legg til egne filer</h2>
                <label for="audio-upload" class="upload-button">
                    📂 Hent lydfiler fra iPad
                </label>
                <input type="file" id="audio-upload" accept="audio/mp3, audio/wav" multiple style="display: none;">
            </section>
        </main>
    </div>

    <audio id="audio-player" style="display: none;"></audio>
    <script src="script.js"></script>
</body>
</html>
